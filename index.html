<!DOCTYPE html>
<html>
<head>
    <title>Ultimate Breakout Screener</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 950px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
        .stock-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .stock-table th, .stock-table td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        .stock-table th { background-color: #2c3e50; color: white; position: sticky; top: 0; }
        .stock-table tr:nth-child(even) { background-color: #f9f9f9; }
        .stock-table tr:hover { background-color: #f1f1f1; }
        #last-updated { font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎯 Top 250 Volume Screener</h2>
        <div class="subtitle">
            <strong>Data Showing:</strong> Top 250 Highest Volume Stocks & CAR Momentum Status<br>
            Last updated: <span id="last-updated">Loading...</span>
        </div>
        <table class="stock-table" id="data-table">
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Price (₹)</th>
                    <th>50 DMA</th>
                    <th>100 DMA</th>
                    <th>200 DMA</th>
                    <th>Dist from 200 DMA</th>
                    <th>CAR Signal</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="7" style="text-align:center;">Fetching latest market data...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('last-updated').textContent = data.last_updated;
                const tbody = document.querySelector('#data-table tbody');
                tbody.innerHTML = ''; 

                if (data.stocks.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#666;">No data available.</td></tr>';
                    return;
                }

                data.stocks.forEach(stock => {
                    // Determine color based on the text
                    let carColor = "#f39c12"; // Orange for short history
                    if (stock['CAR Signal'].includes("BUY")) {
                        carColor = "#27ae60"; // Green
                    } else if (stock['CAR Signal'].includes("AVOID")) {
                        carColor = "#e74c3c"; // Red
                    }

                    const row = `<tr>
                        <td><strong>${stock.Symbol}</strong></td>
                        <td>${stock['Price (₹)']}</td>
                        <td>${stock['50 DMA']}</td>
                        <td>${stock['100 DMA']}</td>
                        <td>${stock['200 DMA']}</td>
                        <td>${stock['Dist from 200 DMA']}</td>
                        <td style="color: ${carColor}; font-weight: bold;">${stock['CAR Signal']}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            })
            .catch(error => {
                console.error('Error loading data:', error);
                document.querySelector('#data-table tbody').innerHTML = '<tr><td colspan="7" style="text-align:center; color:red;">Failed to load data. The market update might be processing.</td></tr>';
            });
    </script>
</body>
</html>
